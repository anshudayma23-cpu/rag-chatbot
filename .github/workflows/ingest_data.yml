name: Mutual Fund Data Ingestion

on:
  schedule:
    - cron: "45 3 * * *" # Runs daily at 9:15 AM IST (3:45 AM UTC)
  workflow_dispatch: # Allows manual triggering

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo playwright install-deps
          playwright install chromium

      - name: Check Environment Variables (Masked)
        run: |
          if [ -z "$CHROMA_API_KEY" ]; then echo "CHROMA_API_KEY is missing"; exit 1; fi
          if [ -z "$GROQ_API_KEY" ]; then echo "GROQ_API_KEY is missing"; exit 1; fi
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Run Ingestion Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
        run: python src/ingestion/main.py --no-file-log
