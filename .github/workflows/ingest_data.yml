name: Mutual Fund Data Ingestion

on:
  schedule:
    - cron: "45 3 * * *" # Runs daily at 9:15 AM IST (3:45 AM UTC)
    - cron: "30 14 * * *" # Runs daily at 8:00 PM IST (14:30 UTC)
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Fail fast if something hangs

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ---------------------------------------------------------------
      # Cache pip installs to speed up subsequent runs
      # ---------------------------------------------------------------
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install --upgrade chromadb
          python -m playwright install --with-deps chromium

      # ---------------------------------------------------------------
      # Sanity check: print versions so failures are easy to trace
      # ---------------------------------------------------------------
      - name: Debug Environment
        run: |
          echo "--- Python version ---"
          python --version
          echo "--- Key package versions ---"
          pip list | grep -E "chromadb|langchain|playwright|torch|huggingface"

      # ---------------------------------------------------------------
      # Hard-stop if truly secret credentials are missing
      # CHROMA_TENANT and CHROMA_DATABASE are config values, not secrets —
      # they are set inline below and do NOT need to be in GitHub Secrets.
      # ---------------------------------------------------------------
      - name: Check Required Secrets
        run: |
          MISSING=0
          if [ -z "${{ secrets.CHROMA_API_KEY }}" ]; then
            echo "❌ CHROMA_API_KEY is missing from GitHub Secrets"
            MISSING=1
          fi
          if [ -z "${{ secrets.HUGGINGFACE_API_KEY }}" ]; then
            echo "❌ HUGGINGFACE_API_KEY is missing from GitHub Secrets"
            MISSING=1
          fi
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "❌ GROQ_API_KEY is missing from GitHub Secrets"
            MISSING=1
          fi
          if [ "$MISSING" -eq 1 ]; then exit 1; fi
          echo "✅ All required secrets found."

      # ---------------------------------------------------------------
      # Run the ingestion pipeline (attempt 1)
      # ---------------------------------------------------------------
      - name: Run Ingestion Pipeline
        id: ingest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: "78e9de2f-30cd-4324-af3b-9ac9d4882489"
          CHROMA_DATABASE: "demo"
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: |
          echo "🚀 Starting ingestion pipeline — $(date -u '+%Y-%m-%d %H:%M UTC')"
          python src/ingestion/main.py --no-file-log

      # ---------------------------------------------------------------
      # Retry once on failure (Groww / HF API transient errors)
      # ---------------------------------------------------------------
      - name: Retry Ingestion on Failure
        if: failure() && steps.ingest.outcome == 'failure'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: "78e9de2f-30cd-4324-af3b-9ac9d4882489"
          CHROMA_DATABASE: "demo"
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: |
          echo "⚠️  First attempt failed. Waiting 60 s before retry..."
          sleep 60
          echo "🔄 Retry attempt — $(date -u '+%Y-%m-%d %H:%M UTC')"
          python src/ingestion/main.py --no-file-log

      # ---------------------------------------------------------------
      # Quick verification: confirm at least 10 docs are in Chroma
      # ---------------------------------------------------------------
      - name: Verify Chroma Collection Count
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: "78e9de2f-30cd-4324-af3b-9ac9d4882489"
          CHROMA_DATABASE: "demo"
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.append(os.getcwd())
          from src.database.chroma_manager import VectorDBManager

          db = VectorDBManager()
          stats = db.get_collection_stats()
          count = stats["count"]
          print(f"✅ Chroma collection '{stats['name']}' has {count} documents.")
          if count < 10:
              print("❌ Document count looks too low — ingestion may have partially failed.")
              sys.exit(1)
          EOF

      # ---------------------------------------------------------------
      # Notify the live server to flush its stale BM25 index and reload
      # fresh data from Chroma so it immediately serves today's data.
      #
      # Set in GitHub Secrets:
      #   WEBHOOK_URL  = https://your-app.onrender.com  (or ngrok URL for local)
      #   RELOAD_SECRET = hdfc-rag-reload-2026
      # ---------------------------------------------------------------
      - name: Reload Live Server Index
        if: success() && secrets.WEBHOOK_URL != ''
        run: |
          echo "📡 Pinging server to reload index..."
          HTTP_STATUS=$(curl -s -o /tmp/reload_response.txt -w "%{http_code}" \
            -X POST "${{ secrets.WEBHOOK_URL }}/api/reload" \
            -H "Authorization: Bearer ${{ secrets.RELOAD_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30)
          cat /tmp/reload_response.txt
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Server index reloaded successfully (HTTP $HTTP_STATUS)"
          else
            echo "⚠️  Reload call returned HTTP $HTTP_STATUS — server may need manual restart"
          fi

