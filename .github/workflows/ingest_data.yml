name: Mutual Fund Data Ingestion

on:
  schedule:
    - cron: "45 3 * * *" # Runs daily at 9:15 AM IST (3:45 AM UTC)
  workflow_dispatch: # Allows manual triggering

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install --upgrade chromadb
          python -m playwright install --with-deps chromium

      - name: Debug Environment
        run: |
          echo "--- Project Structure ---"
          ls -R
          echo "--- Package Versions ---"
          pip list | grep -E "chromadb|langchain|playwright|torch"

      - name: Check Environment Variables
        run: |
          if [ -z "${{ secrets.CHROMA_API_KEY }}" ]; then echo "❌ ERROR: CHROMA_API_KEY is missing in GitHub Secrets"; exit 1; fi
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then echo "❌ ERROR: GROQ_API_KEY is missing in GitHub Secrets"; exit 1; fi
          echo "✅ All required secrets found."

      - name: Run Ingestion Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
        run: python src/ingestion/main.py --no-file-log
