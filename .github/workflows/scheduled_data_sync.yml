name: Scheduled Mutual Fund Data Sync

on:
  schedule:
    # Mutual Fund NAVs typically update between 9:00 PM and 11:00 PM IST.
    # We run at 11:45 PM IST (18:15 UTC) to guarantee we catch the late updates.
    - cron: "15 18 * * *"
    
    # We also run at 9:15 AM IST (03:45 UTC) to catch any morning corrections.
    - cron: "45 3 * * *"
    
  workflow_dispatch: # Allows you to manually trigger the sync via GitHub UI

jobs:
  sync_and_reload:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache Python Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install --upgrade chromadb
          python -m playwright install --with-deps chromium

      - name: Verify Environment Secrets
        run: |
          MISSING=0
          if [ -z "${{ secrets.CHROMA_API_KEY }}" ]; then echo "❌ CHROMA_API_KEY missing"; MISSING=1; fi
          if [ -z "${{ secrets.HUGGINGFACE_API_KEY }}" ]; then echo "❌ HUGGINGFACE_API_KEY missing"; MISSING=1; fi
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then echo "❌ GROQ_API_KEY missing"; MISSING=1; fi
          if [ "$MISSING" -eq 1 ]; then exit 1; fi
          echo "✅ All core API secrets present."

      - name: Run Scraper and Ingestion (Attempt 1)
        id: ingest_primary
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: "78e9de2f-30cd-4324-af3b-9ac9d4882489"
          CHROMA_DATABASE: "demo"
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: |
          echo "🚀 Starting primary sync..."
          python src/ingestion/main.py --no-file-log

      - name: Retry Sync on Failure (Attempt 2)
        if: steps.ingest_primary.outcome == 'failure'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: "78e9de2f-30cd-4324-af3b-9ac9d4882489"
          CHROMA_DATABASE: "demo"
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: |
          echo "⚠️ Primary sync failed. Waiting 60 seconds before retrying..."
          sleep 60
          echo "🔄 Starting retry sync..."
          python src/ingestion/main.py --no-file-log

      - name: Trigger Live Server Index Reload
        if: success()
        run: |
          if [ -z "${{ secrets.WEBHOOK_URL }}" ]; then
            echo "⚠️ WEBHOOK_URL secret not set. Cannot ping live server. The server will need a manual restart to show new data."
            exit 0
          fi
          if [ -z "${{ secrets.RELOAD_SECRET }}" ]; then
            echo "⚠️ RELOAD_SECRET secret not set. The live server will reject the ping."
            exit 0
          fi
          
          echo "📡 Ping live server to reload Chroma database index..."
          HTTP_STATUS=$(curl -s -o /tmp/reload_response.txt -w "%{http_code}" \
            -X POST "${{ secrets.WEBHOOK_URL }}/api/reload" \
            -H "Authorization: Bearer ${{ secrets.RELOAD_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30)
          
          cat /tmp/reload_response.txt
          echo ""
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Live Server Index Reloaded Successfully! Chatbot is now serving the latest data."
          else
            echo "❌ Reload call failed with HTTP $HTTP_STATUS. Chatbot might serve stale data until restarted."
            exit 1
          fi
